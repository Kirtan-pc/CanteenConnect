services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: http://backend:4000
    ports:
      - "5173:80"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
